name: ikhlas
description: Ikhlas — where nikah begins with deen.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing (with status-based guards)
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1   # iOS requirement when offering Google login

  # Fonts (Fraunces display + Inter body — loaded via google_fonts)
  google_fonts: ^6.2.1

  # Selfie capture (manual for now; a liveness SDK replaces the capture
  # source in a later phase behind the same verification.selfie shape)
  image_picker: ^1.1.2

  # Application fraud signals: device fingerprint + approximate location
  # recorded on the application doc (disclosed to the applicant)
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  geolocator: ^13.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Amiri (Arabic) bundled locally for reverence-critical text.
  # Drop Amiri-Regular.ttf into assets/fonts/ then uncomment:
  # fonts:
  #   - family: Amiri
  #     fonts:
  #       - asset: assets/fonts/Amiri-Regular.ttf
