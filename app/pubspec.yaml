name: ikhlas
description: Ikhlas — where nikah begins with deen.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing (with status-based guards)
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.1.3
  cloud_functions: ^5.1.3

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1   # iOS requirement when offering Google login

  # Photo selection from the gallery (profile photos)
  image_picker: ^1.1.2
  # Selfie capture — dedicated front-camera screen (image_picker's front
  # preference is ignored by many Android devices). A liveness SDK replaces
  # the capture source later behind the same verification.selfie shape.
  camera: ^0.11.0+2

  # Application fraud signals: device fingerprint + approximate location
  # recorded on the application doc (disclosed to the applicant)
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  geolocator: ^13.0.1

  cupertino_icons: ^1.0.8

  # Member photos are served through an auth'd Cloud Function (blur + watermark
  # per request — the most expensive backend call). Disk-cache them so repeat
  # views across the batch/detail/chat don't re-invoke it.
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

# Launcher icon — gold girih "i" monogram on deep emerald (brand spec).
# Regenerate after changing assets/icon/*: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A120C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
  # Fonts bundled locally (no runtime fetch → sharp on first frame, offline,
  # no dependency on Google's servers). Fraunces = display serif,
  # Inter = UI, Amiri = Arabic reverence-critical text.
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces_400Regular.ttf
          weight: 400
        - asset: assets/fonts/Fraunces_600SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fraunces_400Regular_Italic.ttf
          weight: 400
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_400Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_500Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_600SemiBold.ttf
          weight: 600
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri_400Regular.ttf
          weight: 400
