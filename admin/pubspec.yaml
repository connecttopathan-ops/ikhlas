name: ikhlas_admin
description: Ikhlas admin dashboard — application review queue (moderator-gated).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  cloud_functions: ^5.1.3
  # Approve/reject go through an HTTP endpoint, not a callable: the
  # cloud_functions web plugin throws Int64 errors on callable responses.
  http: ^1.2.2

  google_fonts: ^6.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
